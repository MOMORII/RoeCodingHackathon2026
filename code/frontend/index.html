<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Budget Tracker</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="container">
    <h1>STUDENT BUDGET TRACKER</h1>

    <!-- =========================
    INPUT SECTION
    Modify inputs here (add new fields if needed)
    ========================= -->

    <input type="text" id="description" placeholder="Expense description">
    <input type="number" id="amount" placeholder="Amount">

    <!-- Category dropdown -->
    <select id="category">
      <option value="Food">Food</option>
      <option value="Travel">Travel</option>
      <option value="Bills">Bills</option>
      <option value="Leisure">Leisure</option>
    </select>

    <button onclick="addExpense()">Add Expense</button>

    <!-- =========================
    BUDGET LIMIT SECTION
    ========================= -->
    <div>
      <input type="number" id="budgetLimit" placeholder="Set Monthly Budget">
      <button onclick="setBudget()">SET BUDGET</button>
    </div>

     <!-- =========================
    SIMPLE CHART (BASIC VISUAL)
    ========================= -->
    <canvas id="chart" width="400" height="200"></canvas>

    <!-- =========================
    TOTAL SPENDING DISPLAY + WARNING
    ========================= -->
    <!-- TOTAL DISPLAY -->
    <div class="total">
      Total Spending: £<span id="total">0</span>
    </div>

    <!-- WARNING MESSAGE -->
    <div id="warning" class="warning"></div>

    <!-- =========================
    EXPENSE LIST DISPLAY
    ========================= -->
    <ul id="expenseList"></ul>
  </div>

  <!-- =========================
  JAVASCRIPT SECTION
  Modify logic and features here
  ========================= -->

  <script>
    let expenses = []; // Stores all expenses
    let total = 0; // Running total
    let budget = 0; // Monthly budget

    // =========================
    // ADD EXPENSE FUNCTION
    // Modify this to change how expenses are added
    // =========================
    function addExpense() {
      const desc = document.getElementById("description").value;
      const amount = parseFloat(document.getElementById("amount").value);
      const category = document.getElementById("category").value;

      if (!desc || isNaN(amount)) {
        alert("Please enter valid details");
        return;
      }

      const expense = { desc, amount, category };
      expenses.push(expense);

      total += amount;

      displayExpenses();
      updateTotal();
      updateChart();

      // Clear inputs
      document.getElementById("description").value = "";
      document.getElementById("amount").value = "";
    }

    // =========================
    // DISPLAY EXPENSES
    // Modify how each expense appears here
    // =========================
    function displayExpenses() {
      const list = document.getElementById("expenseList");
      list.innerHTML = "";

      expenses.forEach((exp, index) => {
        const li = document.createElement("li");
        li.innerHTML = `${exp.desc} (£${exp.amount}) - ${exp.category} 
          <button onclick="deleteExpense(${index})">X</button>`;
        list.appendChild(li);
      });
    }

    // =========================
    // DELETE EXPENSE
    // =========================
    function deleteExpense(index) {
      total -= expenses[index].amount;
      expenses.splice(index, 1);

      displayExpenses();
      updateTotal();
      updateChart();
    }

    // =========================
    // UPDATE TOTAL + CHECK BUDGET
    // =========================
    function updateTotal() {
      document.getElementById("total").innerText = total.toFixed(2);

      const warning = document.getElementById("warning");

      if (budget && total > budget) {
        warning.innerText = "⚠ You exceeded your budget!";
      } else {
        warning.innerText = "";
      }
    }

    // =========================
    // SET BUDGET
    // =========================
    function setBudget() {
      budget = parseFloat(document.getElementById("budgetLimit").value);
      updateTotal();
    }
    // =========================
    // CHART.JS VERSION (REPLACE OLD CANVAS)
    // =========================
    let chart;

    function updateChart() {
      const ctx = document.getElementById("chart").getContext("2d");

      let categories = {};

      // Group expenses
      expenses.forEach(exp => {
        categories[exp.category] = (categories[exp.category] || 0) + exp.amount;
      });

      const labels = Object.keys(categories);
      const data = Object.values(categories);

      // Destroy old chart before redraw
      if (chart) {
        chart.destroy();
      }

      chart = new Chart(ctx, {
        type: "bar",
        data: {
          labels: labels,
          datasets: [{
            label: "Spending (£)",
            data: data,
            backgroundColor: [
              "#66bb6a",
              "#42a5f5",
              "#ef5350",
              "#ffca28"
            ]
          }]
        },
        options: {
          responsive: true,
          scales: {
            y: {
              beginAtZero: true,
              ticks: {
                callback: value => "£" + value
              }
            }
          }
        }
      });
    }
  </script>
</body>
</html>
